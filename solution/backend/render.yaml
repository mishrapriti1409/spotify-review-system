services:
  - type: web
    name: spotify-review-discovery-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
